server {
    listen 80 default_server;
    server_name _;
    access_log off;
    
    location / {
        proxy_pass http://laravel.test:80;
        
        # Передаем полный HOST (для localhost:8000)
        proxy_set_header Host $http_host; 
        
        # Говорим Ларавелю, что запрос пришел от прокси
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Установим протокол просто как HTTP, так как это внутренняя связь
        proxy_set_header X-Forwarded-Proto http; 
    }
}

